apiVersion: v1
kind: Service
metadata:
  name: sam-hub-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  type: LoadBalancer
  loadBalancerIP: ${LOAD_BALANCER_IP}
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
      name: libp2p
  selector:
    app: sam-hub-${ENV_NAME}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-hub-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sam-hub-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-hub-${ENV_NAME}
    spec:
      containers:
      - name: sam-hub
        image: your-registry/sam-hub:${IMAGE_TAG}
        ports:
        - containerPort: 4001
        env:
        - name: SAM_EXTERNAL_MULTIADDR
          value: "${EXTERNAL_MULTIADDR}"
        
        # Critical for multi-tenant clusters: prevent testnet from starving prod
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
