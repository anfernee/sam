name: Python SDK Test

on:
  push:
    branches: [ main ]
    paths:
      - 'sam-mcp-python/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'sam-mcp-python/**'

jobs:
  test_python:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Build Go node
      run: |
        make build

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
      working-directory: sam-mcp-python

    - name: Run unit tests
      run: |
        pytest tests/unit
      working-directory: sam-mcp-python

    - name: Run E2E tests
      run: |
        pytest tests/e2e
      working-directory: sam-mcp-python
